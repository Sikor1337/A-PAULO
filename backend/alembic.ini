# A generic, single database configuration.

[alembic]
# Path to migration scripts - relative to this file
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Date stamp format for migration file names
truncate_slug_length = 40
revision_environment = false

# Set to 'true' to require explicit revisions for downgrade operations
prepend_sys_path = .

# Timezone for file generation
timezone = UTC

# Default output encoding
output_encoding = utf-8

# Database URL - not used directly in our setup since we use env vars
# but required by alembic structure
sqlalchemy.url = driver://user:pass@localhost/dbname



[post_write_hooks]
# Hooks run after generating a migration file
# Uncomment to enable black formatting
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
